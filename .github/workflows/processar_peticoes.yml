name: Processar Petições

on:
  workflow_dispatch:

jobs:
  processar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Rodar pipeline
        env:
          INBOX_MOCK_PATH: ${{ secrets.INBOX_MOCK_PATH }}
        run: python -m src.main

      - name: Upload artefatos (.docx)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: peticoes-geradas
          path: output/*.docx
          if-no-files-found: ignore
