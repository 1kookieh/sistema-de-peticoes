name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Lint e smoke test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Verificar sintaxe (py_compile)
        run: |
          python -m compileall config.py src tests

      - name: Rodar testes automatizados
        run: pytest -q

      - name: Smoke test do pipeline
        env:
          EMAIL_ADVOGADO: advogado.ci@example.com
          INBOX_MOCK_PATH: ./examples/inbox_smoke.json
        run: |
          mkdir -p output
          python -m src

      - name: Validar artefato gerado
        run: |
          shopt -s nullglob
          for f in output/*.docx; do
            echo "Validando $f"
            python -m src.core.validation.docx "$f"
          done
        shell: bash
