name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Lint e smoke test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verificar sintaxe (py_compile)
        run: |
          python -m py_compile config.py
          python -m py_compile src/__init__.py src/main.py src/gmail_reader.py src/gmail_sender.py src/formatar_docx.py src/validar_docx.py

      - name: Smoke test do pipeline
        env:
          EMAIL_ADVOGADO: ci@example.com
          INBOX_MOCK_PATH: ./teste_inbox.json
        run: |
          mkdir -p output
          python -m src.main

      - name: Validar artefato gerado
        run: |
          shopt -s nullglob
          for f in output/*.docx; do
            echo "Validando $f"
            python -m src.validar_docx "$f"
          done
        shell: bash
